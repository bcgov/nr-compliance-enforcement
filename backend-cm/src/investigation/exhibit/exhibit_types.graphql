type Exhibit {
  exhibitGuid: String!
  taskGuid: String!
  investigationGuid: String!
  exhibitNumber: Int!
  description: String!
  dateCollected: DateTime!
  collectedAppUserGuidRef: String!
  activeIndicator: Boolean!
  createdDate: DateTime!
  updatedDate: DateTime
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
  pageSize: Int!
}

type ExhibitResult {
  items: [Exhibit!]!
  pageInfo: PageInfo!
}

input ExhibitFilters {
  investigationGuid: String!
  search: String
  taskFilter: String
  sortBy: String
  sortOrder: String
}

input CreateUpdateExhibitInput {
  exhibitGuid: String
  taskGuid: String
  investigationGuid: String
  description: String
  dateCollected: DateTime
  collectedAppUserGuidRef: String
  appUserIdentifier: String
}
