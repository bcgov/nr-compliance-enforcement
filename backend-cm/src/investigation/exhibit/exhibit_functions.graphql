type Mutation {
  createExhibit(input: CreateUpdateExhibitInput!): Exhibit!
  removeExhibit(exhibitGuid: String!): Exhibit!
  updateExhibit(input: CreateUpdateExhibitInput!): Exhibit!
}

type Query {
  getExhibitsByTask(taskId: String): [Exhibit]!
  searchExhibitsByInvestigation(page: Int = 1, pageSize: Int = 25, filters: ExhibitFilters!): ExhibitResult!
  getExhibit(exhibitGuid: String): Exhibit
}
