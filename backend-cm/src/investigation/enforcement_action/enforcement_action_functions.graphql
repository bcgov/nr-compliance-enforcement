type Query {
  enforcementActions(contraventionPartyXrefId: String!): [EnforcementAction]!
  enforcementAction(enforcementActionId: String!): EnforcementAction
}

type Mutation {
  createEnforcementAction(input: CreateEnforcementActionInput!): EnforcementAction!
  updateEnforcementAction(input: UpdateEnforcementActionInput!): EnforcementAction!
  removeEnforcementAction(enforcementActionId: String!): EnforcementAction!
}
