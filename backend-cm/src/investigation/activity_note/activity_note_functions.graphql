type Query {
  getActivityNote(activityNoteGuid: String!): ActivityNote
  getActivityNotes(investigationGuid: String!, activityNoteCode: String): [ActivityNote!]
  getActivityNotesByTask(taskGuid: String!): [ActivityNote!]
  searchActivityNotes(searchString: String!): [ActivityNote!]
}

type Mutation {
  saveActivityNote(input: ActivityNoteInput!): ActivityNote!
}
