scalar DateTime

type Party {
  partyIdentifier: String
  partyTypeCode: String
  longDescription: String
  shortDescription: String
  createdDateTime: DateTime
  updatedDateTime: DateTime
  createdByUserGuid: String
  person: Person
  business: Business
  addresses: [Address]
  contactMethods: [ContactMethod]
  aliases: [Alias]
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  totalCount: Int!
  totalPages: Int!
  currentPage: Int!
  pageSize: Int!
}

type PartyResult {
  items: [Party!]!
  pageInfo: PageInfo!
}

input PartyCreateInput {
  partyTypeCode: String!
  longDescription: String
  shortDescription: String
  person: PersonInput
  business: BusinessInput
  addresses: [AddressInput]
  contactMethods: [ContactMethodInput]
  aliases: [AliasInput]
}

input PartyUpdateInput {
  partyTypeCode: String!
  longDescription: String
  shortDescription: String
  person: PersonUpdateInput
  business: BusinessUpdateInput
  addresses: [AddressUpdateInput]
  contactMethods: [ContactMethodInput]
  aliases: [AliasUpdateInput]
}

input PartyFilters {
  search: String
  partyTypeCode: String
  sortBy: String
  sortOrder: String
}
