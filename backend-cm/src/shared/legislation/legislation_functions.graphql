type Query {
  legislations(
    agencyCode: String!
    legislationTypeCodes: [String]
    ancestorGuid: String
    legislationSourceGuid: String
    excludeRegulations: Boolean
    onlyActive: Boolean
    offenseDate: String
  ): [Legislation]!
  legislation(legislationGuid: String!, includeAncestors: Boolean): Legislation
  legislationTypeCodes: [LegislationType]!
}
