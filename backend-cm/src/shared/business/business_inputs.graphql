input BusinessInput {
  name: String!
  aliases: [AliasInput]
  businessIdentifiers: [BusinessIdentifierInput]
  contactPeople: [BusinessPersonInput]
}

input BusinessUpdateInput {
  businessGuid: String
  name: String
  aliases: [AliasUpdateInput]
  businessIdentifiers: [BusinessIdentifierUpdateInput]
  contactPeople: [BusinessPersonUpdateInput]
}

# Distinct input type as shared parties currently have mandatory fields.  Could combine in future.
input BusinessMatchInput {
  name: String
  businessIdentifiers: [BusinessIdentifierMatchInput!]
}
