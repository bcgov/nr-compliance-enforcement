input PersonInput {
  firstName: String!
  middleNames: String
  lastName: String!
  dateOfBirth: DateTime
  approximateAgeCode: String
  driversLicenseNumber: String
  driversLicenseClass: String
  driversLicenseCountryCode: String
  driversLicenseCountrySubdivisionCode: String
  genderCode: String
  sexCode: String
  aliases: [AliasInput]
  heightInCm: Float
  weightInKg: Float
  complexionCode: String
  buildCode: String
  hairColourCode: String
  hairLengthCode: String
  hairColourOther: String
  eyeColourCode: String
  eyeColourOther: String
  facialHairIndicator: Boolean
  facialHairStyleCodes: [PersonFacialHairStyleCodeInput]
  additionalHairDescriptors: String
  tattooIndicator: Boolean
  tattooDescription: String
  additionalDescriptors: String
  comments: String
  boloIndicator: Boolean
}

input PersonUpdateInput {
  personGuid: String!
  firstName: String!
  middleNames: String
  lastName: String!
  dateOfBirth: DateTime
  approximateAgeCode: String
  driversLicenseNumber: String
  driversLicenseClass: String
  driversLicenseCountryCode: String
  driversLicenseCountrySubdivisionCode: String
  genderCode: String
  sexCode: String
  aliases: [AliasInput]
  heightInCm: Float
  weightInKg: Float
  complexionCode: String
  buildCode: String
  hairColourCode: String
  hairLengthCode: String
  hairColourOther: String
  eyeColourCode: String
  eyeColourOther: String
  facialHairIndicator: Boolean
  facialHairStyleCodes: [PersonFacialHairStyleCodeInput]
  additionalHairDescriptors: String
  tattooIndicator: Boolean
  tattooDescription: String
  additionalDescriptors: String
  comments: String
  boloIndicator: Boolean
}

# Distinct input type as shared parties currently have mandatory fields.  Could combine in future.
input PersonMatchInput {
  firstName: String
  lastName: String
  dateOfBirth: DateTime
  genderCode: String
  sexCode: String
  driversLicenseNumber: String
}
