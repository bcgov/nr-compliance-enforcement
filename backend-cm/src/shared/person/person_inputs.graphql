input PersonInput {
  firstName: String!
  middleName: String
  middleName2: String
  lastName: String!
  dateOfBirth: String
  driversLicenseNumber: String
  driversLicenseJurisdiction: String
  sexCode: String
  contactMethods: [ContactMethodInput]
}

input ContactMethodInput {
  contactMethodGuid: String
  typeCode: String!
  value: String!
  isPrimary: Boolean
  isActive: Boolean
}
