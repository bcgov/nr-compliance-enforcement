name: Hotfix to Release
on:
  push:
    # Hotfix PRs merged into a release branch trigger a prod deploy.
    # Branch CREATION (e.g. cutting release/X.Y from main) is filtered out by
    # `if: github.event.created != true` on each job below — that case is
    # handled by `release.yaml` via workflow_dispatch.
    branches: [release/**]
    paths-ignore:
      - "*.md"
      - ".github/graphics/**"
  workflow_dispatch:
    inputs:
      pr_no:
        description: "PR-numbered container set to deploy"
        type: number
        required: true

concurrency:
  # Cancel previous pending/running workflows
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  GITOPS_REPO_BRANCH: main
  GITOPS_REPO: bcgov-c/tenant-gitops-f208ae
  GITOPS_REPO_VALUES_PATH: ./charts/apps/natsuite/values
  GITOPS_REPO_OUTPUTS_PATH: ./charts/apps/natsuite/values/.outputs
  FLYWAY_PLACEHOLDERS_COMPLAINT_PASSWORD: default
  FLYWAY_PLACEHOLDERS_INVESTIGATION_PASSWORD: default
  FLYWAY_PLACEHOLDERS_INSPECTION_PASSWORD: default
  FLYWAY_PLACEHOLDERS_SHARED_PASSWORD: default
  FLYWAY_PLACEHOLDERS_COMPLAINT_OUTCOME_PASSWORD: default
  FLYWAY_PLACEHOLDERS_METABASE_READONLY_PASSWORD: default

jobs:
  vars:
    name: Set Variables
    # Skip when this push is a branch creation (e.g. cutting release/X.Y from main).
    # The cut is handled by release.yaml; this workflow only reacts to hotfix merges.
    if: github.event.created != true
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    runs-on: ubuntu-22.04
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v4
      # Resolve PR# from the merge commit SHA; honor manual dispatch override
      - name: PR Number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NO: ${{ inputs.pr_no }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            pr="$INPUT_PR_NO"
          else
            pr=$(./.github/scripts/sha-to-pr.sh "${{ github.sha }}")
          fi
          [[ "$pr" =~ ^[0-9]+$ ]] || { echo "Invalid PR number: $pr" >&2; exit 1; }
          echo "pr=$pr" >> "$GITHUB_OUTPUT"

  promote:
    name: Promote Images
    needs: [vars]
    if: github.event.created != true
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    strategy:
      matrix:
        package:
          [
            backend,
            frontend,
            migration-complaint,
            webeoc,
            backend-cm,
            migration-complaint-outcome,
            migration-investigation,
            migration-inspection,
            migration-shared,
            event-worker,
          ]
    timeout-minutes: 1
    steps:
      - uses: shrink/actions-docker-registry-tag@f04afd0559f66b288586792eb150f45136a927fa
        with:
          registry: ghcr.io
          repository: ${{ github.repository }}/${{ matrix.package }}
          target: ${{ needs.vars.outputs.pr }}
          tags: prod
  generate-schema-spy:
    name: Generate SchemaSpy Documentation
    if: github.event.created != true
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: default
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: default
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Enable Extensions
        run: |
          docker exec $(docker ps -q --filter "ancestor=postgis/postgis:16-3.4") \
            psql -U postgres -d default -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
      - name: Flyway - shared
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/default
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: default
          FLYWAY_LOCATIONS: filesystem:./migration-shared/migrations,filesystem:./migration-shared/baseline
          FLYWAY_DEFAULT_SCHEMA: shared
        with:
          args: info migrate info
      - name: Flyway - complaint
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/default
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: default
          FLYWAY_LOCATIONS: filesystem:./migration-complaint/migrations,filesystem:./migration-complaint/baseline
          FLYWAY_DEFAULT_SCHEMA: complaint
        with:
          args: info migrate info
      - name: Flyway - complaint outcome
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/default
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: default
          FLYWAY_LOCATIONS: filesystem:./migration-complaint-outcome/migrations,filesystem:./migration-complaint-outcome/baseline
          FLYWAY_DEFAULT_SCHEMA: complaint_outcome
        with:
          args: info migrate info
      - name: Flyway - inspection
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/default
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: default
          FLYWAY_LOCATIONS: filesystem:./migration-inspection/migrations,filesystem:./migration-inspection/baseline
          FLYWAY_DEFAULT_SCHEMA: inspection
        with:
          args: info migrate info
      - name: Flyway - investigation
        uses: docker://flyway/flyway:10
        env:
          FLYWAY_URL: jdbc:postgresql://postgres:5432/default
          FLYWAY_USER: postgres
          FLYWAY_PASSWORD: default
          FLYWAY_LOCATIONS: filesystem:./migration-investigation/migrations,filesystem:./migration-investigation/baseline
          FLYWAY_DEFAULT_SCHEMA: investigation
        with:
          args: info migrate info
      - name: Create Output Folder
        run: |
          mkdir output
          chmod a+rwx -R output
      - name: Run Schemaspy
        run: docker run --network host -v "$PWD/output:/output" schemaspy/schemaspy:6.2.4 -t pgsql11 -db default -host 127.0.0.1 -port 5432 -u postgres -p default -schemas shared,complaint,complaint_outcome,investigation,inspection
      - name: Deploy to Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: output
          target-folder: schemaspy

  ### Emerald jobs
  deploy-emerald-hotfix-to-prod:
    name: Deploy Hotfix Workloads To Emerald (prod)
    needs: [vars, promote]
    if: github.event.created != true
    environment: prod
    runs-on: ubuntu-22.04
    permissions:
      packages: write
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ssh-key: ${{ secrets.MANIFEST_REPO_DEPLOY_KEY }}
          ref: ${{ env.GITOPS_REPO_BRANCH }}
      - name: Configure git
        # From https://github.com/orgs/community/discussions/26560#discussioncomment-3531273
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Roll hotfix changes out to prod
        run: |
          VALUES_DIR="${{ env.GITOPS_REPO_VALUES_PATH }}" \
          OUTPUTS_DIR="${{ env.GITOPS_REPO_OUTPUTS_PATH }}" \
          ./.github/scripts/gitops.sh candidate

      - name: Commit and push update
        run: |
          ./.github/scripts/gitops.sh commitall "Updating prod for hotfix PR ${{ needs.vars.outputs.pr }}"
          git push origin ${{ env.GITOPS_REPO_BRANCH }}
